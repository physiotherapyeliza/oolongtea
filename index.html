// === 資料持久化 (localStorage) ===
const STORAGE_KEY = 'teaApp.v1';

const loadState = (userId) => {
  try {
    const key = userId ? (STORAGE_KEY + '.' + userId) : STORAGE_KEY;
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
};

function App({ userId, userName, onSwitchUser }) {
  const __saved = loadState(userId);
  const [activeTab, setActiveTab] = useState('teas');

  const [teas, setTeas] = useState(__saved?.teas ?? INITIAL_TEAS);
  const [evals, setEvals] = useState(__saved?.evals ?? INITIAL_EVALS);
  const [logs, setLogs] = useState(__saved?.logs ?? INITIAL_LOGS);
  const [wares, setWares] = useState(__saved?.wares ?? INITIAL_WARES);
  const [storageFull, setStorageFull] = useState(false);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [expandedTeas, setExpandedTeas] = useState({});
  const [expandedBrews, setExpandedBrews] = useState({});

  // 這位使用者專屬的雲端文件
  const cloudDocRef = window.__db ? window.__db.collection("appData").doc("user_" + userId) : null;

  // === 雲端同步狀態 ===
  // syncStatus: 'loading' 讀取中 | 'synced' 已同步 | 'saving' 儲存中 | 'offline' 離線/未連雲端 | 'error' 錯誤
  const [syncStatus, setSyncStatus] = useState(window.__db ? 'loading' : 'offline');
  const cloudReadyRef = useRef(false);   // 是否已完成首次雲端讀取
  const skipNextSaveRef = useRef(false); // 收到雲端更新時，避免又立刻寫回造成循環
  const saveTimerRef = useRef(null);     // debounce 計時器

  // 開啟 App 時：先讀雲端，並持續監聽雲端變動（其他裝置改了會自動更新過來）
  useEffect(() => {
    if (!cloudDocRef) { setSyncStatus('offline'); return; }
    const unsub = cloudDocRef.onSnapshot(
      (snap) => {
        if (snap.exists) {
          const d = snap.data();
          skipNextSaveRef.current = true; // 這次更新來自雲端，不要再寫回
          if (Array.isArray(d.teas))  setTeas(d.teas);
          if (Array.isArray(d.evals)) setEvals(d.evals);
          if (Array.isArray(d.logs))  setLogs(d.logs);
          if (Array.isArray(d.wares)) setWares(d.wares);
        }
        cloudReadyRef.current = true;
        setSyncStatus('synced');
      },
      (err) => {
        console.warn('雲端讀取失敗', err);
        cloudReadyRef.current = true;
        setSyncStatus('error');
      }
    );
    return () => unsub && unsub();
  // eslint-disable-next-line
  }, [userId]);

  // 資料變動時：存回 localStorage（即時備份）+ 推到雲端（debounce 防止太頻繁）
  useEffect(() => {
    // 本機備份（每位使用者各自一份）
    try {
      localStorage.setItem(STORAGE_KEY + '.' + userId, JSON.stringify({ teas, evals, logs, wares }));
      setStorageFull(false);
    } catch (e) {
      setStorageFull(true);
    }

    // 雲端同步
    if (!cloudDocRef) return;
    // 若這次變動是「雲端推下來的」，就不要再寫回雲端
    if (skipNextSaveRef.current) { skipNextSaveRef.current = false; return; }
    // 首次雲端資料還沒讀回來前，先別覆蓋雲端（避免用初始資料蓋掉雲端既有資料）
    if (!cloudReadyRef.current) return;

    setSyncStatus('saving');
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      cloudDocRef.set({ teas, evals, logs, wares, updatedAt: Date.now() })
        .then(() => setSyncStatus('synced'))
        .catch((err) => { console.warn('雲端儲存失敗', err); setSyncStatus('error'); });
    }, 800);
  }, [teas, evals, logs, wares]);

  const [showAddTea, setShowAddTea] = useState(false);
  const [isEditingTea, setIsEditingTea] = useState(false);
  const [showAdvancedShop, setShowAdvancedShop] = useState(false);
  const [showAdvancedOrigin, setShowAdvancedOrigin] = useState(false);
  const [showAddEval, setShowAddEval] = useState(false);
  const [showAromaInfo, setShowAromaInfo] = useState(false);
  const [activeFlavorCategories, setActiveFlavorCategories] = useState([]);
  const [showAddLog, setShowAddLog] = useState(false);
  const [logStep, setLogStep] = useState(1);
  const [brewPanels, setBrewPanels] = useState({});
  const [editingLogId, setEditingLogId] = useState(null);
  const [shareCard, setShareCard] = useState(null);
  const [filters, setFilters] = useState({ teas: {}, evals: {}, logs: {} });
  const [filterOpen, setFilterOpen] = useState({});
  const [cardFlipped, setCardFlipped] = useState(false);
  const [showAddWare, setShowAddWare] = useState(false);
  const [isEditingWare, setIsEditingWare] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [copiedId, setCopiedId] = useState(null);

  const [teaForm, setTeaForm] = useState(DEFAULT_TEA_FORM);
  const [wareForm, setWareForm] = useState(DEFAULT_WARE_FORM);
  const [newEval, setNewEval] = useState(DEFAULT_EVAL_FORM);
  const [newLog, setNewLog] = useState({ teaId: '', brewMode: 'single', ratio: 50, brewTemp: 100, dryShape: '條形', brewTime: 300, wareIds: [], temp: 95, duration: 45, waterAmount: 150, teaAmount: 5, notes: '', logDate: '', logTime: '', weather: '', place: '', mood: '', company: '', soupPhoto: '', soupAroma: 5, soupSweet: 5, soupSour: 5, soupUmami: 5, soupAstringent: 5, soupPuckering: 5, soupBright: 5, soupBalance: 5, brews: [makeBrew(100)] });

  const handleSubmitTea = (e) => {
    e.preventDefault();
    if (isEditingTea) {
      setTeas(teas.map(t => t.id === teaForm.id ? { ...teaForm } : t));
    } else {
      setTeas([{ ...teaForm, id: `t-${Date.now()}` }, ...teas]);
    }
    setShowAddTea(false);
    setTeaForm(DEFAULT_TEA_FORM);
    setIsEditingTea(false);
  };

  const handleEditTea = (tea) => {
    setTeaForm({ ...tea });
    setIsEditingTea(true);
    setShowAdvancedShop(!!(tea.shopAddress || tea.shopUrl || tea.tastingPrice || tea.shopProfessionalism));
    setShowAdvancedOrigin(!!(tea.slopeAspect || tea.waterShortage || tea.harvestWeather || tea.pestDamage));
    setShowAddTea(true);
  };

  const handleAddNewTea = () => {
    setTeaForm(DEFAULT_TEA_FORM);
    setIsEditingTea(false);
    setShowAdvancedShop(false);
    setShowAdvancedOrigin(false);
    setShowAddTea(true);
  };

  const handleSubmitEval = (e) => {
    e.preventDefault();
    if(!newEval.teaId) return;
    const now = new Date();
    const filteredEvals = evals.filter(ev => ev.teaId !== newEval.teaId);
    const finalRating = Number(((newEval.infusedAromaRating + newEval.soupRating + newEval.infusedLeafRating) / 3).toFixed(1));
    setEvals([{ id: `e-${Date.now()}`, date: now.toISOString().split('T')[0], ...newEval, rating: finalRating }, ...filteredEvals]);
    setShowAddEval(false);
  };

  const handleSubmitLog = (e) => {
    e.preventDefault();
    if(!newLog.teaId) return;
    const now = new Date();
    if (editingLogId) {
      setLogs(logs.map(l => l.id === editingLogId ? {
        ...l, ...newLog,
        date: newLog.logDate || l.date,
        time: newLog.logTime || l.time
      } : l));
    } else {
      setLogs([{
        id: `l-${Date.now()}`,
        ...newLog,
        date: newLog.logDate || now.toISOString().split('T')[0],
        time: newLog.logTime || now.toTimeString().substring(0, 5)
      }, ...logs]);
    }
    setShowAddLog(false);
    setLogStep(1);
    setEditingLogId(null);
  };

  const handleEditLog = (log, step) => {
    setNewLog({
      teaId: log.teaId,
      brewMode: log.brewMode || 'single',
      ratio: log.ratio ?? 50,
      brewTemp: log.brewTemp ?? 100,
      dryShape: log.dryShape || '條形',
      brewTime: log.brewTime ?? 300,
      wareIds: log.wareIds || (log.wareId ? [log.wareId] : []),
      temp: log.temp ?? 95,
      duration: log.duration ?? 45,
      waterAmount: log.waterAmount ?? 150,
      teaAmount: log.teaAmount ?? 5,
      notes: log.notes || '',
      logDate: log.date || '',
      logTime: log.time || '',
      weather: log.weather || '',
      place: log.place || '',
      mood: log.mood || '',
      company: log.company || '',
      soupPhoto: log.soupPhoto || '',
      soupAroma: log.soupAroma ?? 5, soupSweet: log.soupSweet ?? 5, soupSour: log.soupSour ?? 5,
      soupUmami: log.soupUmami ?? 5, soupAstringent: log.soupAstringent ?? 5, soupPuckering: log.soupPuckering ?? 5,
      soupBright: log.soupBright ?? 5, soupBalance: log.soupBalance ?? 5,
      brews: (log.brews && log.brews.length) ? log.brews.map(b => ({ ...makeBrew(b.temp), ...b })) : [makeBrew(100)]
    });
    setEditingLogId(log.id);
    setBrewPanels({});
    setLogStep(step || 1);
    setShowAddLog(true);
  };

  const requestDelete = (type, id) => setDeleteTarget({ type, id });

  const confirmDelete = () => {
    if (!deleteTarget) return;
    const { type, id } = deleteTarget;
    if(type === 'tea') setTeas(teas.filter(t => t.id !== id));
    if(type === 'eval') setEvals(evals.filter(e => e.id !== id));
    if(type === 'log') setLogs(logs.filter(l => l.id !== id));
    if(type === 'ware') setWares(wares.filter(w => w.id !== id));
    setDeleteTarget(null);
  };

  const confirmReset = () => {
    try { localStorage.removeItem(STORAGE_KEY + '.' + userId); } catch (e) {}
    setTeas(INITIAL_TEAS);
    setEvals(INITIAL_EVALS);
    setLogs(INITIAL_LOGS);
    setWares(INITIAL_WARES);
    setShowResetConfirm(false);
    setStorageFull(false);
    // 同步把雲端也重設（避免重新整理後雲端又把舊資料推回來）
    if (cloudDocRef && cloudReadyRef.current) {
      cloudDocRef.set({
        teas: INITIAL_TEAS, evals: INITIAL_EVALS, logs: INITIAL_LOGS, wares: INITIAL_WARES, updatedAt: Date.now()
      }).catch((err) => console.warn('雲端重設失敗', err));
    }
  };

  const getTeaContextForLog = (teaId) => {
    const tea = teas.find(t => t.id === teaId);
    const evaluation = evals.find(e => e.teaId === teaId);
    const typeDefault = tea ? TEA_TYPES.find(t => t.id === tea.type) : null;
    return { tea, evaluation, typeDefault };
  };

  const unevaluatedTeas = teas.filter(t => !evals.some(e => e.teaId === t.id));
  const getDisplayName = (tea) => tea.shop ? `${tea.shop} - ${tea.name}` : tea.name;
  const toggleExpandTea = (id) => setExpandedTeas(prev => ({ ...prev, [id]: !prev[id] }));

  // === 篩選機制 ===
  const getTeaRating = (teaId) => {
    const ev = evals.find(e => e.teaId === teaId);
    return ev ? ev.rating : null;
  };

  // 收集可用篩選選項（從現有茶葉資料動態產生）
  const filterOptions = {
    type: Array.from(new Set(teas.map(t => t.type))).map(id => ({ id, name: TEA_TYPES.find(x => x.id === id)?.name || id })),
    shop: Array.from(new Set(teas.map(t => t.shop).filter(Boolean))),
    season: Array.from(new Set(teas.map(t => t.season).filter(Boolean))),
    cultivar: Array.from(new Set(teas.map(t => t.cultivar).filter(Boolean))),
    rating: [5, 4, 3, 2, 1],
  };

  const toggleFilter = (tab, dim, val) => {
    setFilters(prev => {
      const cur = prev[tab]?.[dim] || [];
      const next = cur.includes(val) ? cur.filter(v => v !== val) : [...cur, val];
      return { ...prev, [tab]: { ...prev[tab], [dim]: next } };
    });
  };

  const clearFilters = (tab) => setFilters(prev => ({ ...prev, [tab]: {} }));

  const activeFilterCount = (tab) => {
    const f = filters[tab] || {};
    return Object.values(f).reduce((s, arr) => s + (arr?.length || 0), 0);
  };

  // 判斷某茶是否通過篩選（rating 傳入該情境的分數）
  const teaPassesFilter = (tab, tea, rating) => {
    const f = filters[tab] || {};
    if (f.type?.length && !f.type.includes(tea.type)) return false;
    if (f.shop?.length && !f.shop.includes(tea.shop)) return false;
    if (f.season?.length && !f.season.includes(tea.season)) return false;
    if (f.cultivar?.length && !f.cultivar.includes(tea.cultivar)) return false;
    if (f.rating?.length) {
      // 「N 星以上」：取選中的最低門檻
      const threshold = Math.min(...f.rating);
      if (rating == null || rating < threshold) return false;
    }
    return true;
  };


  const getTastingHint = (shape) => {
    switch(shape) {
      case '條形': return '茶樣3g - 品鑑組茶具 - 開水 - 5min';
      case '球型': return '茶樣3g - 品鑑組茶具 - 開水 - 6min';
      case '東方美人': return '茶樣3g - 品鑑組茶具 - 5.5min';
      case '散茶': return '茶樣3g - 品鑑組茶具 - 開水 - 5min';
      case '茶磚':
      case '茶餅': return '茶樣3g - 品鑑組茶具 - 開水 - 5min';
      default: return '請先選擇茶乾辨識以獲取標準沖泡提示';
    }
  };

  const getBrewTimeSec = (shape) => {
    switch(shape) {
      case '條形': return 300;
      case '球型': return 360;
      default: return 330;
    }
  };

  // 投茶量自動計算：僅當「正好選一個壺或蓋碗」且該茶具有容量時，容量 ÷ 茶水比水值
  const calcTeaAmount = (wareIds, ratio) => {
    if (!Array.isArray(wareIds) || wareIds.length !== 1) return null;
    const w = wares.find(x => x.id === wareIds[0]);
    if (!w) return null;
    if (w.type !== '壺' && w.type !== '蓋碗') return null;
    const cap = parseFloat(w.capacity);
    if (!cap || !ratio) return null;
    return Math.round((cap / ratio) * 10) / 10;
  };

  // 注水量自動帶入：僅當「正好選一個壺或蓋碗」且該茶具有容量時，取其容量
  const calcWaterAmount = (wareIds) => {
    if (!Array.isArray(wareIds) || wareIds.length !== 1) return null;
    const w = wares.find(x => x.id === wareIds[0]);
    if (!w) return null;
    if (w.type !== '壺' && w.type !== '蓋碗') return null;
    const cap = parseFloat(w.capacity);
    if (!cap) return null;
    return cap;
  };

  const fmtMMSS = (sec) => {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  };

  const handleWareImage = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setWareForm(prev => ({ ...prev, image: reader.result }));
    reader.readAsDataURL(file);
  };

  const handleSoupPhoto = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setNewLog(prev => ({ ...prev, soupPhoto: reader.result }));
    reader.readAsDataURL(file);
  };

  const handleAddNewWare = () => {
    setWareForm(DEFAULT_WARE_FORM);
    setIsEditingWare(false);
    setShowAddWare(true);
  };

  const handleEditWare = (ware) => {
    setWareForm({ ...ware });
    setIsEditingWare(true);
    setShowAddWare(true);
  };

  const handleSubmitWare = (e) => {
    e.preventDefault();
    const payload = { ...wareForm, name: wareDisplayName(wareForm) };
    if (isEditingWare) {
      setWares(wares.map(w => w.id === payload.id ? { ...payload } : w));
    } else {
      setWares([{ ...payload, id: `w-${Date.now()}` }, ...wares]);
    }
    setShowAddWare(false);
    setWareForm(DEFAULT_WARE_FORM);
    setIsEditingWare(false);
  };

  const handleShare = (tea) => {
    setShareCard(tea);
    setCardFlipped(false);
  };

  const handleDownloadCard = async () => {
    const node = document.getElementById('share-card-capture');
    if (!node || !window.html2canvas) return;
    try {
      const canvas = await window.html2canvas(node, { scale: 2, backgroundColor: null, useCORS: true });
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      const name = shareCard ? (shareCard.shop ? `${shareCard.shop}-${shareCard.name}` : shareCard.name) : '茶卡';
      a.href = url;
      a.download = `${name}-${cardFlipped ? '茶行' : '茶葉'}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch (e) {
      console.error('下載失敗', e);
    }
  };

  const renderFilterBar = (tab) => {
    const f = filters[tab] || {};
    const count = activeFilterCount(tab);
    const open = !!filterOpen[tab];
    const groups = [
      { dim: 'type', label: '製程', opts: filterOptions.type.map(o => ({ val: o.id, text: o.name })) },
      { dim: 'shop', label: '茶行', opts: filterOptions.shop.map(s => ({ val: s, text: s })) },
      { dim: 'season', label: '季節', opts: filterOptions.season.map(s => ({ val: s, text: s })) },
      { dim: 'cultivar', label: '品種', opts: filterOptions.cultivar.map(s => ({ val: s, text: s })) },
      { dim: 'rating', label: '評分', opts: filterOptions.rating.map(n => ({ val: n, text: `${n}★以上` })) },
    ];
    return (
      <div>
        <div className="flex items-center gap-2">
          <button
            onClick={() => setFilterOpen(prev => ({ ...prev, [tab]: !prev[tab] }))}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-bold transition-colors ${open || count > 0 ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-white text-stone-500 border-stone-200 hover:border-emerald-300'}`}
          >
            <FileText className="w-3.5 h-3.5" /> 篩選
            {count > 0 && <span className="bg-emerald-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px]">{count}</span>}
            {open ? <ChevronUp className="w-3.5 h-3.5" /> : <ChevronDown className="w-3.5 h-3.5" />}
          </button>
          {count > 0 && !open && <button onClick={() => clearFilters(tab)} className="text-[11px] text-stone-400 hover:text-red-500">清除</button>}
        </div>
        {open && (
          <div className="bg-white border border-stone-200 rounded-xl p-3 space-y-2.5 mt-2 animate-in fade-in slide-in-from-top-1">
            <div className="flex items-center justify-between">
              <span className="text-xs font-bold text-stone-500">快速篩選{count > 0 ? `（${count}）` : ''}</span>
              {count > 0 && <button onClick={() => clearFilters(tab)} className="text-[11px] text-stone-400 hover:text-red-500">清除全部</button>}
            </div>
            {groups.map(g => g.opts.length > 0 && (
              <div key={g.dim} className="flex items-start gap-2">
                <span className="text-[10px] font-bold text-stone-400 w-8 shrink-0 mt-1.5">{g.label}</span>
                <div className="flex flex-wrap gap-1.5">
                  {g.opts.map(o => {
                    const on = (f[g.dim] || []).includes(o.val);
                    return (
                      <button key={String(o.val)} onClick={() => toggleFilter(tab, g.dim, o.val)} className={`text-[11px] px-2.5 py-1 rounded-full border transition-colors ${on ? 'bg-emerald-600 text-white border-emerald-600 font-bold' : 'bg-white text-stone-600 border-stone-200 hover:border-emerald-300'}`}>{o.text}</button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  const NAV = [
    { id: 'teas', label: '茶葉資訊', icon: Sprout },
    { id: 'evals', label: '品鑑結果', icon: Award },
    { id: 'logs', label: '品茗時光', icon: Coffee },
    { id: 'wares', label: '茶具', icon: Beaker },
  ];

  return (
    <div className="min-h-screen text-stone-800" style={{ background: 'var(--paper)' }}>

      {/* Header + 頂部水平導覽 (網頁版) */}
      <header className="shadow-md sticky top-0 z-30" style={{ background: 'var(--celadon-deep)', color: 'var(--paper)' }}>
        <div className="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <Coffee className="w-6 h-6" style={{ color: 'var(--paper)', opacity: 0.85 }} />
            <h1 className="text-2xl tracking-[0.3em] font-shoujin" style={{ fontWeight: 600 }}>三韻半盞</h1>
            {(() => {
              const map = {
                loading: { t: '雲端讀取中…', c: 'rgba(244,239,228,0.55)' },
                saving:  { t: '同步中…',     c: 'rgba(244,239,228,0.7)' },
                synced:  { t: '已同步雲端',   c: 'rgba(244,239,228,0.7)' },
                offline: { t: '本機儲存',     c: 'rgba(244,239,228,0.5)' },
                error:   { t: '雲端連線失敗', c: '#e8b4a0' },
              };
              const s = map[syncStatus] || map.offline;
              return (
                <span className="hidden sm:inline-flex items-center gap-1 ml-2 text-[11px] tracking-wider" style={{ color: s.c }}>
                  <span className="w-1.5 h-1.5 rounded-full" style={{ background: syncStatus === 'error' ? '#cc6b52' : (syncStatus === 'synced' ? '#9fd0a8' : 'currentColor'), opacity: 0.9 }} />
                  {s.t}
                </span>
              );
            })()}
          </div>
          <nav className="flex items-center gap-1">
            {NAV.map(item => {
              const Icon = item.icon;
              const active = activeTab === item.id;
              return (
                <button
                  key={item.id}
                  onClick={() => setActiveTab(item.id)}
                  className="relative flex items-center gap-1.5 px-4 py-2 rounded-sm text-sm transition-colors"
                  style={active
                    ? { background: 'var(--paper)', color: 'var(--celadon-deep)', fontWeight: 700 }
                    : { color: 'rgba(244,239,228,0.78)' }}
                >
                  <Icon className="w-4 h-4" />
                  <span className="hidden sm:inline tracking-widest">{item.label}</span>
                  {item.id === 'evals' && unevaluatedTeas.length > 0 && (
                    <span className="absolute top-1 right-2 w-2 h-2 rounded-full animate-pulse" style={{ background: '#9c4a3c' }} />
                  )}
                </button>
              );
            })}
          </nav>
          <button
            onClick={onSwitchUser}
            title="切換使用者"
            className="flex items-center gap-1.5 ml-1 px-3 py-1.5 rounded-sm text-sm transition-colors"
            style={{ color: 'rgba(244,239,228,0.85)', border: '1px solid rgba(244,239,228,0.3)' }}
          >
            <User className="w-4 h-4" />
            <span className="hidden md:inline tracking-widest max-w-[7rem] truncate">{userName}</span>
          </button>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-6 py-8">
        {storageFull && (
          <div className="mb-4 bg-amber-50 border border-amber-200 text-amber-800 text-sm rounded-xl p-3 flex items-start gap-2">
            <Info className="w-4 h-4 mt-0.5 shrink-0" />
            <span>儲存空間已滿，最新的變更可能未被保存。照片會佔用較多空間，建議刪除部分含照片的紀錄或茶具後再試。</span>
          </div>
        )}

        {/* --- TAB 1: 茶葉資訊 --- */}
        {activeTab === 'teas' && (
          <div className="space-y-5">
            <div className="flex justify-between items-center">
              <h2 className="text-xl font-bold text-stone-800 flex items-center gap-2"><Sprout className="w-6 h-6" style={{ color: 'var(--celadon)' }} /> 茶葉資訊</h2>
              <button onClick={handleAddNewTea} className="text-white py-2 px-4 rounded-full flex items-center gap-1 text-sm shadow transition-colors" style={{ background: 'var(--celadon-deep)' }}>
                <Plus className="w-4 h-4" /> 新增茶葉
              </button>
            </div>
            {renderFilterBar('teas')}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 items-start">
              {teas.filter(tea => teaPassesFilter('teas', tea, getTeaRating(tea.id))).map(tea => {
                const typeInfo = TEA_TYPES.find(t => t.id === tea.type);
                const teaEval = evals.find(e => e.teaId === tea.id);
                const isExpanded = !!expandedTeas[tea.id];

                return (
                  <div key={tea.id} className="bg-white rounded-xl p-4 shadow-sm border border-stone-200 relative group transition-colors hover:border-emerald-300">

                    <div className="absolute top-3 right-3 flex gap-2 bg-white/80 backdrop-blur-sm rounded-lg px-1">
                      <button onClick={() => handleEditTea(tea)} className="text-stone-300 hover:text-emerald-600 p-1"><Edit2 className="w-4 h-4" /></button>
                      <button onClick={() => requestDelete('tea', tea.id)} className="text-stone-300 hover:text-red-500 p-1"><Trash2 className="w-4 h-4" /></button>
                    </div>

                    <div className="pr-16">
                      <div className="flex items-center flex-wrap gap-2 mt-1">
                        <h3 className="font-bold text-base leading-snug text-stone-800">{getDisplayName(tea)}</h3>
                        <span className={`text-[10px] px-2 py-0.5 rounded-full inline-flex items-center gap-1 ${typeInfo?.color || 'bg-stone-500 text-white'}`}>
                          {typeInfo?.name || '未知茶類'}
                        </span>
                      </div>
                    </div>

                    <div className="mt-3 grid grid-cols-2 gap-y-2 gap-x-2 text-xs text-stone-500 bg-stone-50 p-3 rounded-lg border border-stone-100">
                      <div className="flex items-center gap-1"><Calendar className="w-3.5 h-3.5 shrink-0" /> <span className="truncate">{tea.year} {tea.season}</span></div>

                </div>
              </form>

          </div>

        const hasShopDetail = t.shopAddress || t.shopUrl || t.tastingPrice || t.shopProfessionalism !== undefined;

        const paper = '#f4efe4';      // 宣紙米白
        const ink = '#3a352c';        // 墨
        const inkSoft = '#8c8472';    // 淡墨

                        <>
                          {t.shopAddress && (
                            <div style={{ padding: '11px 0', borderBottom: `1px solid ${line}` }}>
                              <div style={{ fontSize: 12, letterSpacing: 2, color: inkSoft, marginBottom: 4 }}>地 址</div>
                              <div style={{ fontSize: 14, letterSpacing: 1, lineHeight: 1.6 }}>{t.shopAddress}</div>
                            </div>
                          )}
                          {t.shopUrl && (
                            <div style={{ padding: '11px 0', borderBottom: `1px solid ${line}` }}>
                              <div style={{ fontSize: 12, letterSpacing: 2, color: inkSoft, marginBottom: 4 }}>網 址</div>
                              <div style={{ fontSize: 12.5, letterSpacing: 0.5, lineHeight: 1.6, wordBreak: 'break-all', color: celadon }}>{t.shopUrl}</div>
                            </div>
                          )}
                          {(t.tastingTeasCount || t.tastingPrice) && (
                            <div style={{ display: 'flex', alignItems: 'baseline', padding: '11px 0', borderBottom: `1px solid ${line}` }}>
                              <span style={{ fontSize: 12, letterSpacing: 2, color: inkSoft, width: 58, flexShrink: 0 }}>試 茶</span>
                              <span style={{ fontSize: 14.5, letterSpacing: 1, textAlign: 'right', flex: 1 }}>{t.tastingTeasCount ? `${t.tastingTeasCount} 款` : ''} {t.tastingPrice ? `${t.tastingPrice} 元` : ''}</span>
                            </div>
                          )}
                          {t.shopProfessionalism !== undefined && (
                            <div style={{ padding: '14px 0 4px' }}>
                              <div style={{ fontSize: 12, letterSpacing: 2, color: inkSoft, marginBottom: 12, textAlign: 'center' }}>環 境 品 評</div>
                              <div style={{ display: 'flex', justifyContent: 'space-around' }}>
                                {[['專', t.shopProfessionalism], ['潔', t.shopCleanliness], ['適', t.shopComfort]].map(([k, v], i) => (
                                  <div key={i} style={{ textAlign: 'center' }}>
                                    <div style={{ fontSize: 22, fontWeight: 700, color: celadon, lineHeight: 1 }}>{v}</div>
                                    <div style={{ fontSize: 11, letterSpacing: 2, color: inkSoft, marginTop: 6 }}>{k}</div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                        </>
                      ) : (
                        <div style={{ paddingTop: 30, textAlign: 'center', color: inkSoft, fontSize: 13, letterSpacing: 2, lineHeight: 2 }}>素 未 記 名<br/>此 茶 未 載 行 肆</div>
                      )}
                    </div>

                    <div className="relative" style={{ marginTop: 22, display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 8, color: inkSoft }}>
                      <span style={{ width: 24, height: 1, background: line }} />
                      <span style={{ fontSize: 10, letterSpacing: 4 }}>三 韻 半 盞</span>
                      <span style={{ width: 24, height: 1, background: line }} />
                    </div>
                  </div>
                )}
              </div>

              {/* 操作列 */}
              <div className="flex items-center gap-2 mt-5">
                <button onClick={() => setCardFlipped(f => !f)} className="flex items-center gap-1.5 bg-white text-stone-700 px-4 py-2.5 rounded-full text-sm font-bold shadow hover:bg-stone-100 transition-colors">
                  <RotateCcw className="w-4 h-4" /> 翻面（{cardFlipped ? '觀茶' : '觀肆'}）
                </button>
                <button onClick={handleDownloadCard} className="flex items-center gap-1.5 bg-stone-800 text-white px-4 py-2.5 rounded-full text-sm font-bold shadow hover:bg-stone-700 transition-colors">
                  <Share2 className="w-4 h-4" /> 下載圖片
                </button>
                <button onClick={() => setShareCard(null)} className="flex items-center justify-center w-10 h-10 bg-white/20 text-white rounded-full hover:bg-white/30 transition-colors">
                  <X className="w-5 h-5" />
                </button>
              </div>
              <div className="text-white/50 text-[11px] mt-2">點卡片外或 ✕ 關閉 · 點「翻面」觀另一面</div>
            </div>
          </div>
        );
      })()}

      {/* 5. 清除所有資料確認 Modal */}
      {showResetConfirm && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[60] p-4">
          <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 className="text-lg font-bold text-stone-800 mb-2">清除所有資料？</h3>
            <p className="text-sm text-stone-500 mb-6">將刪除所有茶葉、品鑑、品茗紀錄與茶具，並回到初始範例資料。此動作無法復原。</p>
            <div className="flex gap-3">
              <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-2.5 rounded-xl bg-stone-100 text-stone-600 font-bold hover:bg-stone-200 transition-colors">取消</button>
              <button onClick={confirmReset} className="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-bold hover:bg-red-600 shadow-md shadow-red-500/20 transition-colors">清除全部</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}


// ====== 使用者選擇層（Netflix 式選 profile） ======
const USERS_KEY = 'teaApp.users';
const LAST_USER_KEY = 'teaApp.lastUser';
const usersDocRef = window.__db ? window.__db.collection("appData").doc("__users") : null;

function genId() {
  return 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function Root() {
  const [users, setUsers] = useState(() => {
    try { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; } catch (e) { return []; }
  });
  const [currentUser, setCurrentUser] = useState(null); // 已選的使用者物件
  const [usersReady, setUsersReady] = useState(!usersDocRef); // 沒雲端就直接 ready
  const [newName, setNewName] = useState('');
  const [manageMode, setManageMode] = useState(false);
  const skipUsersSave = useRef(false);

  // 監聽雲端使用者清單（多裝置共用同一份名單）
  useEffect(() => {
    if (!usersDocRef) return;
    const unsub = usersDocRef.onSnapshot((snap) => {
      if (snap.exists && Array.isArray(snap.data().list)) {
        skipUsersSave.current = true;
        setUsers(snap.data().list);
      }
      setUsersReady(true);
    }, (err) => { console.warn('讀取使用者清單失敗', err); setUsersReady(true); });
    return () => unsub && unsub();
  }, []);

  // 使用者清單變動 → 存本機 + 推雲端
  useEffect(() => {
    try { localStorage.setItem(USERS_KEY, JSON.stringify(users)); } catch (e) {}
    if (!usersDocRef) return;
    if (skipUsersSave.current) { skipUsersSave.current = false; return; }
    if (!usersReady) return;
    usersDocRef.set({ list: users, updatedAt: Date.now() })
      .catch((err) => console.warn('儲存使用者清單失敗', err));
  }, [users]);

  const addUser = () => {
    const name = newName.trim();
    if (!name) return;
    const u = { id: genId(), name };
    const isFirst = users.length === 0;
    setUsers(prev => [...prev, u]);
    setNewName('');
    // 若這是第一位使用者，把舊版「共用」資料搬進他的帳號，避免既有紀錄遺失
    if (isFirst && window.__db) {
      const oldRef = window.__db.collection("appData").doc("shared");
      oldRef.get().then(snap => {
        if (snap.exists) {
          const d = snap.data();
          window.__db.collection("appData").doc("user_" + u.id)
            .set({ teas: d.teas || [], evals: d.evals || [], logs: d.logs || [], wares: d.wares || [], updatedAt: Date.now() })
            .catch(() => {});
        }
      }).catch(() => {});
    }
  };

  const removeUser = (id) => {
    setUsers(prev => prev.filter(u => u.id !== id));
    // 一併清掉該使用者的雲端資料
    if (window.__db) {
      window.__db.collection("appData").doc("user_" + id).delete().catch(() => {});
    }
    try { localStorage.removeItem(STORAGE_KEY + '.' + id); } catch (e) {}
  };

  const pickUser = (u) => {
    setCurrentUser(u);
    try { localStorage.setItem(LAST_USER_KEY, u.id); } catch (e) {}
  };

  const switchUser = () => {
    setCurrentUser(null);
    setManageMode(false);
  };

  // 已選好使用者 → 進入主 App
  if (currentUser) {
    return <App userId={currentUser.id} userName={currentUser.name} onSwitchUser={switchUser} />;
  }

  // 還在等雲端首次載入
  if (!usersReady) {
    return (
      <div style={{ minHeight: '100vh', background: 'var(--paper)' }} className="flex items-center justify-center">
        <div className="text-stone-400 tracking-widest">載入中…</div>
      </div>
    );
  }

  // 使用者選擇畫面
  return (
    <div style={{ minHeight: '100vh', background: 'var(--paper)' }} className="flex flex-col items-center justify-center px-6 py-12">
      <div className="flex items-center gap-2.5 mb-2">
        <Coffee className="w-7 h-7" style={{ color: 'var(--celadon-deep)' }} />
        <h1 className="text-3xl tracking-[0.3em] font-shoujin" style={{ fontWeight: 600, color: 'var(--ink)' }}>三韻半盞</h1>
      </div>
      <p className="text-stone-400 text-sm tracking-widest mb-10">請選擇使用者</p>

      <div className="flex flex-wrap items-center justify-center gap-5 max-w-2xl">
        {users.map(u => (
          <div key={u.id} className="relative flex flex-col items-center">
            <button
              onClick={() => manageMode ? null : pickUser(u)}
              className="w-24 h-24 rounded-full flex items-center justify-center transition-transform hover:scale-105 shadow-md"
              style={{ background: 'var(--celadon)', color: 'var(--paper)' }}
            >
              <span className="text-3xl font-shoujin" style={{ fontWeight: 600 }}>{u.name.slice(0, 1)}</span>
            </button>
            <span className="mt-2.5 text-sm tracking-wider text-stone-600 max-w-[6rem] truncate">{u.name}</span>
            {manageMode && (
              <button
                onClick={() => removeUser(u.id)}
                className="absolute -top-1 -right-1 w-7 h-7 rounded-full bg-red-500 text-white flex items-center justify-center shadow"
                title="刪除此使用者"
              >
                <Trash2 className="w-3.5 h-3.5" />
              </button>
            )}
          </div>
        ))}

        {/* 新增使用者 */}
        {!manageMode && (
          <div className="flex flex-col items-center">
            <div className="w-24 h-24 rounded-full flex flex-col items-center justify-center gap-1 border-2 border-dashed" style={{ borderColor: 'var(--line)' }}>
              <input
                value={newName}
                onChange={e => setNewName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') addUser(); }}
                placeholder="名字"
                className="w-16 text-center text-xs bg-transparent outline-none text-stone-600 placeholder-stone-300"
              />
              <button onClick={addUser} className="w-7 h-7 rounded-full flex items-center justify-center" style={{ background: 'var(--celadon-deep)', color: 'var(--paper)' }} title="新增使用者">
                <Plus className="w-4 h-4" />
              </button>
            </div>
            <span className="mt-2.5 text-sm tracking-wider text-stone-400">新增</span>
          </div>
        )}
      </div>

      {users.length > 0 && (
        <button
          onClick={() => setManageMode(m => !m)}
          className="mt-12 text-xs tracking-widest text-stone-400 hover:text-stone-600 underline underline-offset-4"
        >
          {manageMode ? '完成' : '管理使用者'}
        </button>
      )}

      {!window.__db && (
        <p className="mt-8 text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
          目前未連上雲端，使用者與資料僅存於這台裝置。
        </p>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>
</body>
</html>
